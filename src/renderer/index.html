<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>NativeBlade Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { height: 100%; }
        body {
            background: #060608;
            color: #e7e9ee;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        ::selection { background: rgba(255, 77, 77, 0.3); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 99px; }
        ::-webkit-scrollbar-track { background: transparent; }

        @keyframes nb-pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
        @keyframes nb-spin { to { transform: rotate(360deg); } }
        @keyframes nb-pop { from { opacity: 0; transform: scale(.96) translateY(6px); } to { opacity: 1; transform: none; } }
        @keyframes nb-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        .nb-pulse { animation: nb-pulse 1.4s ease-in-out infinite; }
        .nb-spin { animation: nb-spin 1s linear infinite; }
        .nb-pop { animation: nb-pop .32s cubic-bezier(.2,.8,.2,1) both; }
        .nb-screen { animation: nb-rise .5s cubic-bezier(.2,.7,.2,1) both; }

        /* Glass surfaces — same recipe as the cloud Studio */
        .nb-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 24px 50px -30px rgba(0,0,0,0.8);
            transition: border-color .2s, transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s;
        }
        .nb-card-hover:hover {
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-3px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.09), 0 34px 64px -28px rgba(0,0,0,0.95);
        }

        .nb-btn { transition: transform .12s ease, filter .2s, box-shadow .2s, border-color .2s, background .2s, color .2s; cursor: pointer; }
        .nb-btn:hover { filter: brightness(1.07); }
        .nb-btn:active { transform: scale(.965); }
        .nb-btn:disabled { cursor: not-allowed; filter: none; transform: none; opacity: .55; }

        .nb-field {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        .nb-field::placeholder { color: #5b616b; }
        .nb-field:focus {
            outline: none;
            border-color: rgba(255,77,77,0.55);
            box-shadow: 0 0 0 3px rgba(220,38,38,0.18);
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
